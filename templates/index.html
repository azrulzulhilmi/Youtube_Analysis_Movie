<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Review Analyzer</title>
    <meta name="description" content="A tool to extract and analyze YouTube video transcripts.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>YouTube Review Analyzer</h1>
            <p>Paste a YouTube link below to automatically extract and analyze the video transcript.</p>
        </header>
        
        <main>
            <section class="input-section">
                <form id="analyze-form">
                    <div class="input-group">
                        <input type="url" id="youtube-url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>
                        <button type="submit" id="analyze-btn">
                            <span class="btn-text">Analyze</span>
                            <span class="loader" style="display: none;"></span>
                        </button>
                    </div>
                </form>
                <div id="error-message" class="error-message" style="display: none;"></div>
            </section>
            
            <section id="results-panel" class="results-section" style="display: none;">
                <h2>Analysis Results</h2>
                
                <div class="analysis-box">
                    <h3>Overall Conclusion</h3>
                    <p id="conclusion-text" class="conclusion-text"></p>
                    
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <h4>Word Count</h4>
                            <p id="word-count" class="metric-value">0</p>
                        </div>
                        <div class="metric-card">
                            <h4>Polarity Score</h4>
                            <p id="polarity-score" class="metric-value">0.0</p>
                        </div>
                    </div>
                    
                    <div class="emotions-section">
                        <h4>Top Emotions</h4>
                        <ul id="emotions-list" class="emotions-list">
                            <!-- Emotions will be populated here -->
                        </ul>
                    </div>
                </div>

                <div class="wordcloud-box" id="wordcloud-box" style="display: none;">
                    <h3>Word Cloud</h3>
                    <img id="wordcloud-img" src="" alt="Transcript Word Cloud" class="wordcloud-img">
                </div>

                <div class="transcript-box">
                    <h3>Extracted Transcript</h3>
                    <div class="transcript-content" id="transcript-text"></div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>Built with Flask & Vanilla JS</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
